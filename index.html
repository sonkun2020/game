<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Simple 3D Field & Dungeon Prototype</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      max-width: 260px;
    }
    #ui h1 {
      font-size: 14px;
      margin: 0 0 4px;
    }
    #ui p {
      margin: 2px 0;
    }
  </style>
</head>
<body>
<div id="ui">
  <h1>3D Prototype</h1>
  <p>WASD：移動</p>
  <p>マウスドラッグ：視点回転</p>
  <p>中央：街の入口（PvP禁止エリア）</p>
  <p>奥の門：遺跡迷宮入口</p>
  <p>右側：草原エリア（フィールド）</p>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // --- 基本セットアップ ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202030);

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 8, 18);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 2, 0);
  controls.update();

  // --- ライト ---
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x404040, 0.8);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // --- 地面（フィールド） ---
  const groundGeo = new THREE.PlaneGeometry(80, 80);
  const groundMat = new THREE.MeshPhongMaterial({ color: 0x335533 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // --- 街の入口（PvP禁止エリア） ---
  const cityAreaGeo = new THREE.PlaneGeometry(16, 16);
  const cityAreaMat = new THREE.MeshBasicMaterial({
    color: 0x444488,
    transparent: true,
    opacity: 0.4
  });
  const cityArea = new THREE.Mesh(cityAreaGeo, cityAreaMat);
  cityArea.rotation.x = -Math.PI / 2;
  cityArea.position.set(0, 0.01, 0);
  scene.add(cityArea);

  // 街のゲート（中央）
  const gateGeo = new THREE.BoxGeometry(10, 6, 1);
  const gateMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
  const gate = new THREE.Mesh(gateGeo, gateMat);
  gate.position.set(0, 3, -8);
  scene.add(gate);

  // --- 遺跡迷宮入口（奥の門） ---
  const ruinBaseGeo = new THREE.BoxGeometry(14, 1, 4);
  const ruinBaseMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
  const ruinBase = new THREE.Mesh(ruinBaseGeo, ruinBaseMat);
  ruinBase.position.set(0, 0.5, -24);
  scene.add(ruinBase);

  const ruinPillarGeo = new THREE.BoxGeometry(1, 8, 1);
  const ruinPillarMat = new THREE.MeshPhongMaterial({ color: 0x777777 });
  const pillarL = new THREE.Mesh(ruinPillarGeo, ruinPillarMat);
  const pillarR = new THREE.Mesh(ruinPillarGeo, ruinPillarMat);
  pillarL.position.set(-5, 4, -24);
  pillarR.position.set(5, 4, -24);
  scene.add(pillarL, pillarR);

  const ruinTopGeo = new THREE.BoxGeometry(12, 1, 1);
  const ruinTop = new THREE.Mesh(ruinTopGeo, ruinPillarMat);
  ruinTop.position.set(0, 8.5, -24);
  scene.add(ruinTop);

  // --- 草原エリア（右側） ---
  const fieldAreaGeo = new THREE.PlaneGeometry(30, 30);
  const fieldAreaMat = new THREE.MeshBasicMaterial({
    color: 0x447744,
    transparent: true,
    opacity: 0.3
  });
  const fieldArea = new THREE.Mesh(fieldAreaGeo, fieldAreaMat);
  fieldArea.rotation.x = -Math.PI / 2;
  fieldArea.position.set(22, 0.02, 10);
  scene.add(fieldArea);

  // --- シンプルな人間（変哲もない感じ） ---
  const humanGroup = new THREE.Group();

  // 体
  const bodyGeo = new THREE.BoxGeometry(1, 2, 0.6);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, 2, 0);
  humanGroup.add(body);

  // 頭
  const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const headMat = new THREE.MeshPhongMaterial({ color: 0xffe0bd });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 3.4, 0);
  humanGroup.add(head);

  // 足
  const legGeo = new THREE.BoxGeometry(0.4, 1.2, 0.4);
  const legMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
  const legL = new THREE.Mesh(legGeo, legMat);
  const legR = new THREE.Mesh(legGeo, legMat);
  legL.position.set(-0.25, 1.0, 0);
  legR.position.set(0.25, 1.0, 0);
  humanGroup.add(legL, legR);

  // 腕
  const armGeo = new THREE.BoxGeometry(0.3, 1.4, 0.3);
  const armMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
  const armL = new THREE.Mesh(armGeo, armMat);
  const armR = new THREE.Mesh(armGeo, armMat);
  armL.position.set(-0.8, 2.4, 0);
  armR.position.set(0.8, 2.4, 0);
  humanGroup.add(armL, armR);

  humanGroup.position.set(0, 0, 6);
  scene.add(humanGroup);

  // --- 簡易ドラゴン（迷宮ボスのイメージ） ---
  const dragonGroup = new THREE.Group();

  const dragonBodyGeo = new THREE.BoxGeometry(4, 2, 8);
  const dragonBodyMat = new THREE.MeshPhongMaterial({ color: 0x772222 });
  const dragonBody = new THREE.Mesh(dragonBodyGeo, dragonBodyMat);
  dragonBody.position.set(0, 2, -30);
  dragonGroup.add(dragonBody);

  const dragonHeadGeo = new THREE.BoxGeometry(2, 1.5, 2);
  const dragonHead = new THREE.Mesh(dragonHeadGeo, dragonBodyMat);
  dragonHead.position.set(0, 2.5, -34);
  dragonGroup.add(dragonHead);

  const wingGeo = new THREE.BoxGeometry(0.5, 3, 6);
  const wingMat = new THREE.MeshPhongMaterial({ color: 0x552222, transparent: true, opacity: 0.8 });
  const wingL = new THREE.Mesh(wingGeo, wingMat);
  const wingR = new THREE.Mesh(wingGeo, wingMat);
  wingL.position.set(-2.5, 3.5, -30);
  wingR.position.set(2.5, 3.5, -30);
  dragonGroup.add(wingL, wingR);

  scene.add(dragonGroup);

  // --- 簡易キーボード移動 ---
  const keys = { w: false, a: false, s: false, d: false };
  window.addEventListener("keydown", (e) => {
    if (e.key === "w") keys.w = true;
    if (e.key === "a") keys.a = true;
    if (e.key === "s") keys.s = true;
    if (e.key === "d") keys.d = true;
  });
  window.addEventListener("keyup", (e) => {
    if (e.key === "w") keys.w = false;
    if (e.key === "a") keys.a = false;
    if (e.key === "s") keys.s = false;
    if (e.key === "d") keys.d = false;
  });

  function movePlayer(delta) {
    const speed = 8;
    const dir = new THREE.Vector3();

    if (keys.w) dir.z -= 1;
    if (keys.s) dir.z += 1;
    if (keys.a) dir.x -= 1;
    if (keys.d) dir.x += 1;

    if (dir.lengthSq() > 0) {
      dir.normalize();
      humanGroup.position.addScaledVector(dir, speed * delta);
    }
  }

  // --- レスポンシブ ---
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- アニメーションループ ---
  let lastTime = performance.now();
  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = (now - lastTime) / 1000;
    lastTime = now;

    movePlayer(delta);

    // ドラゴンの羽を軽く動かす
    const t = now * 0.002;
    wingL.rotation.z = Math.sin(t) * 0.3;
    wingR.rotation.z = -Math.sin(t) * 0.3;

    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
